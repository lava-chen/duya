<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="120" viewBox="0 0 1200 120" role="img" aria-labelledby="title desc">
  <title id="title">Privacy and control</title>
  <desc id="desc">Section header with serif title and mono section number.</desc>

  <rect width="1200" height="120" fill="#fefdfb"/>

  <line x1="64" y1="24" x2="1136" y2="24" stroke="#1a1a1a" stroke-opacity="0.06" stroke-width="1"/>

  <text x="64" y="56" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" font-weight="500" fill="#6b6b6b" letter-spacing="1.5">SETTINGS</text>

  <text x="64" y="96" font-family="Georgia, 'Times New Roman', serif" font-size="40" font-weight="700" fill="#1a1a1a" letter-spacing="-1">Privacy and control</text>

  <!-- Right: permission chip like command palette row -->
  <g transform="translate(960 72)">
    <rect x="0" y="0" width="176" height="28" rx="6" fill="#ffffff" stroke="#e5e5e5" stroke-width="1"/>
    <!-- Shield icon -->
    <g transform="translate(8 6)" stroke="#6b6b6b" stroke-width="1.5" fill="none">
      <path d="M8 0 L14 3 V8 C14 12 8 16 8 16 C8 16 2 12 2 8 V3 Z"/>
      <path d="M5 8 L7 10 L11 6"/>
    </g>
    <text x="32" y="18" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="500" fill="#1a1a1a">ask · permission</text>
    <text x="168" y="18" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#7c3aed" text-anchor="end" font-weight="600">on</text>
  </g>

  <line x1="64" y1="108" x2="1136" y2="108" stroke="#1a1a1a" stroke-opacity="0.06" stroke-width="1"/>
</svg>