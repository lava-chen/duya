<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="540" viewBox="0 0 1200 540" role="img" aria-labelledby="title desc">
  <title id="title">Duya architecture overview</title>
  <desc id="desc">Four isolated layers from renderer UI through Electron main, agent server, isolated workers, to the tool surface. Codex-style flat cards with purple accent on the agent layer.</desc>

  <defs>
    <filter id="layerShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="18" flood-color="#000000" flood-opacity="0.12"/>
      <feDropShadow dx="0" dy="1" stdDeviation="4" flood-color="#000000" flood-opacity="0.06"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0 L8 3 L0 6 Z" fill="#6b6b6b"/>
    </marker>
  </defs>

  <!-- Canvas -->
  <rect width="1200" height="540" fill="#fefdfb"/>

  <!-- Top hairline + section header -->
  <line x1="64" y1="40" x2="1136" y2="40" stroke="#1a1a1a" stroke-opacity="0.06" stroke-width="1"/>
  <text x="64" y="28" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" font-weight="500" fill="#6b6b6b" letter-spacing="1.5">ARCHITECTURE</text>
  <text x="1136" y="28" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#6b6b6b" text-anchor="end" letter-spacing="1">HTTP + SSE · IPC · CHILD_PROCESS</text>

  <!-- Title: Copernicus fallback serif -->
  <text x="64" y="84" font-family="Georgia, 'Times New Roman', serif" font-size="36" font-weight="700" fill="#1a1a1a" letter-spacing="-1">Isolated by design.</text>
  <text x="64" y="110" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#6b6b6b">Agent runs can be interrupted, persisted, and recovered — not trapped in one chat loop.</text>

  <!-- Layer 1: Renderer UI -->
  <g transform="translate(160 148)">
    <text x="0" y="-10" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" font-weight="500" fill="#6b6b6b" letter-spacing="1.5">LAYER 01</text>
    <g filter="url(#layerShadow)">
      <rect x="0" y="0" width="880" height="60" rx="10" fill="#ffffff" stroke="#e5e5e5" stroke-width="1"/>
    </g>
    <text x="20" y="28" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="700" fill="#1a1a1a">Renderer UI</text>
    <text x="20" y="48" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#6b6b6b">Chat · tool cards · workspace panels · canvas</text>
    <text x="860" y="28" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#6b6b6b" text-anchor="end">Vite · React 19 · TS</text>
    <text x="860" y="48" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#1a1a1a" opacity="0.3" text-anchor="end">src/</text>
  </g>

  <!-- Connector -->
  <line x1="600" y1="212" x2="600" y2="236" stroke="#6b6b6b" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="612" y="228" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="9" fill="#6b6b6b">IPC</text>

  <!-- Layer 2: Electron Main -->
  <g transform="translate(160 248)">
    <text x="0" y="-10" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" font-weight="500" fill="#6b6b6b" letter-spacing="1.5">LAYER 02</text>
    <g filter="url(#layerShadow)">
      <rect x="0" y="0" width="880" height="60" rx="10" fill="#ffffff" stroke="#e5e5e5" stroke-width="1"/>
    </g>
    <text x="20" y="28" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="700" fill="#1a1a1a">Electron Main Process</text>
    <text x="20" y="48" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#6b6b6b">Agent server · IPC handlers · local persistence</text>
    <text x="860" y="28" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#6b6b6b" text-anchor="end">SQLite · better-sqlite3</text>
    <text x="860" y="48" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#1a1a1a" opacity="0.3" text-anchor="end">electron/</text>
  </g>

  <!-- Connector -->
  <line x1="600" y1="312" x2="600" y2="336" stroke="#6b6b6b" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="612" y="328" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="9" fill="#6b6b6b">HTTP + SSE</text>

  <!-- Layer 3: Isolated Workers (accent layer) -->
  <g transform="translate(160 348)">
    <text x="0" y="-10" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" font-weight="500" fill="#7c3aed" letter-spacing="1.5">LAYER 03 · CORE</text>
    <g filter="url(#layerShadow)">
      <rect x="0" y="0" width="880" height="60" rx="10" fill="#ffffff" stroke="#7c3aed" stroke-opacity="0.3" stroke-width="1"/>
    </g>
    <text x="20" y="28" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="700" fill="#1a1a1a">Isolated Agent Workers</text>
    <text x="20" y="48" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#6b6b6b">Child processes · modes · permission flow · tool loop</text>
    <text x="860" y="28" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#7c3aed" text-anchor="end" font-weight="600">@duya/agent</text>
    <text x="860" y="48" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#1a1a1a" opacity="0.3" text-anchor="end">packages/agent/</text>
    <!-- Accent check mark -->
    <g transform="translate(836 12)" stroke="#7c3aed" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M0 6 L4 10 L12 2"/>
    </g>
  </g>

  <!-- Connector -->
  <line x1="600" y1="412" x2="600" y2="436" stroke="#6b6b6b" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="612" y="428" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="9" fill="#6b6b6b">tool exec</text>

  <!-- Layer 4: Tool surface — Codex-style chips -->
  <g transform="translate(160 448)">
    <text x="0" y="-8" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" font-weight="500" fill="#6b6b6b" letter-spacing="1.5">LAYER 04 — TOOL SURFACE</text>
    <g transform="translate(0 8)" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#6b6b6b">
      <rect x="0" y="0" width="96" height="28" rx="6" fill="#ffffff" stroke="#e5e5e5" stroke-width="1"/>
      <text x="48" y="18" text-anchor="middle">browser</text>
      <rect x="112" y="0" width="80" height="28" rx="6" fill="#ffffff" stroke="#e5e5e5" stroke-width="1"/>
      <text x="152" y="18" text-anchor="middle">files</text>
      <rect x="208" y="0" width="80" height="28" rx="6" fill="#ffffff" stroke="#e5e5e5" stroke-width="1"/>
      <text x="248" y="18" text-anchor="middle">shell</text>
      <rect x="304" y="0" width="88" height="28" rx="6" fill="#ffffff" stroke="#e5e5e5" stroke-width="1"/>
      <text x="348" y="18" text-anchor="middle">memory</text>
      <rect x="408" y="0" width="80" height="28" rx="6" fill="#ffffff" stroke="#e5e5e5" stroke-width="1"/>
      <text x="448" y="18" text-anchor="middle">skills</text>
      <rect x="504" y="0" width="72" height="28" rx="6" fill="#ffffff" stroke="#e5e5e5" stroke-width="1"/>
      <text x="540" y="18" text-anchor="middle">MCP</text>
      <rect x="592" y="0" width="104" height="28" rx="6" fill="#ffffff" stroke="#e5e5e5" stroke-width="1"/>
      <text x="644" y="18" text-anchor="middle">conductor</text>
      <rect x="712" y="0" width="96" height="28" rx="6" fill="#ffffff" stroke="#e5e5e5" stroke-width="1"/>
      <text x="760" y="18" text-anchor="middle">widgets</text>
    </g>
  </g>

  <!-- Bottom hairline + caption -->
  <line x1="64" y1="520" x2="1136" y2="520" stroke="#1a1a1a" stroke-opacity="0.06" stroke-width="1"/>
  <text x="64" y="536" font-family="Georgia, 'Times New Roman', serif" font-size="12" font-style="italic" fill="#6b6b6b">Each layer can fail, restart, or be inspected without taking down the others.</text>
</svg>