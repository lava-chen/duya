<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="380" viewBox="0 0 1200 380" role="img" aria-labelledby="title desc">
  <title id="title">Duya — a local-first desktop AI agent</title>
  <desc id="desc">Hero with Copernicus-style serif wordmark, Styrene-style sans tagline, Fira Mono metadata, and a Codex-style command palette preview with purple accent.</desc>

  <defs>
    <filter id="popoverShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="18" flood-color="#000000" flood-opacity="0.12"/>
      <feDropShadow dx="0" dy="1" stdDeviation="4" flood-color="#000000" flood-opacity="0.06"/>
    </filter>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="4" flood-color="#000000" flood-opacity="0.06"/>
    </filter>
  </defs>

  <!-- Canvas: warm white -->
  <rect width="1200" height="380" fill="#fefdfb"/>

  <!-- Left: title block -->
  <g transform="translate(64 80)">
    <!-- Mono eyebrow -->
    <text x="0" y="0" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" font-weight="500" fill="#6b6b6b" letter-spacing="1.5">DESKTOP AI AGENT · LOCAL-FIRST</text>

    <!-- Wordmark: Copernicus fallback (Georgia serif) -->
    <text x="0" y="80" font-family="Georgia, 'Times New Roman', serif" font-size="96" font-weight="700" fill="#1a1a1a" letter-spacing="-3">Duya</text>

    <!-- Tagline: Styrene fallback (system sans) -->
    <text x="0" y="126" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif" font-size="20" font-weight="400" fill="#1a1a1a">A local-first desktop AI agent for research,</text>
    <text x="0" y="152" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif" font-size="20" font-weight="400" fill="#1a1a1a">files, code, and visible workflows.</text>

    <!-- Capability list: mono, Codex-style -->
    <g transform="translate(0 188)" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#6b6b6b">
      <text x="0" y="12" letter-spacing="1">RESEARCH</text>
      <text x="84" y="12" fill="#1a1a1a" opacity="0.2">·</text>
      <text x="96" y="12" letter-spacing="1">FILES</text>
      <text x="148" y="12" fill="#1a1a1a" opacity="0.2">·</text>
      <text x="160" y="12" letter-spacing="1">CODE</text>
      <text x="208" y="12" fill="#1a1a1a" opacity="0.2">·</text>
      <text x="220" y="12" letter-spacing="1">BROWSER</text>
      <text x="296" y="12" fill="#1a1a1a" opacity="0.2">·</text>
      <text x="308" y="12" letter-spacing="1">CANVAS</text>
    </g>

    <!-- Lead: serif italic -->
    <text x="0" y="236" font-family="Georgia, 'Times New Roman', serif" font-size="14" font-style="italic" fill="#6b6b6b">Not blind autonomy — controlled agency.</text>
  </g>

  <!-- Right: Codex-style command palette popover (mimics SlashCommandPopover) -->
  <g transform="translate(640 60)" filter="url(#popoverShadow)">
    <!-- Popover container: 10px radius, #ffffff bg, #e5e5e5 border -->
    <rect x="0" y="0" width="496" height="280" rx="10" fill="#ffffff" stroke="#e5e5e5" stroke-width="1"/>

    <!-- Window chrome (minimal) -->
    <rect x="0" y="0" width="496" height="32" rx="10" fill="#fdf8f5"/>
    <rect x="0" y="16" width="496" height="16" fill="#fdf8f5"/>
    <circle cx="18" cy="16" r="5" fill="#1a1a1a" opacity="0.15"/>
    <circle cx="34" cy="16" r="5" fill="#1a1a1a" opacity="0.15"/>
    <circle cx="50" cy="16" r="5" fill="#1a1a1a" opacity="0.15"/>
    <text x="248" y="20" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" fill="#6b6b6b" text-anchor="middle" opacity="0.6">duya — workspace</text>

    <!-- Section header: Mode (11px/500/muted) -->
    <text x="14" y="52" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" font-weight="500" fill="#6b6b6b">Mode</text>

    <!-- Row: Research (selected — accent + check) -->
    <g transform="translate(8 58)">
      <rect x="0" y="0" width="480" height="28" rx="6" fill="#f1f1f1"/>
      <!-- Icon: globe -->
      <g transform="translate(10 6)" stroke="#6b6b6b" stroke-width="1.5" fill="none">
        <circle cx="8" cy="8" r="7"/>
        <ellipse cx="8" cy="8" rx="3" ry="7"/>
        <line x1="1" y1="8" x2="15" y2="8"/>
      </g>
      <text x="36" y="18" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#7c3aed">Research</text>
      <text x="92" y="18" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="10" font-style="italic" fill="#6b6b6b">read-only · web_search · web_fetch</text>
      <!-- Check icon (accent) -->
      <g transform="translate(452 8)" stroke="#7c3aed" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M0 6 L4 10 L12 2"/>
      </g>
    </g>

    <!-- Row: Plan Task -->
    <g transform="translate(8 90)">
      <rect x="0" y="0" width="480" height="28" rx="6" fill="transparent"/>
      <g transform="translate(10 6)" stroke="#6b6b6b" stroke-width="1.5" fill="none">
        <rect x="0" y="0" width="16" height="16" rx="2"/>
        <path d="M3 8 L7 12 L13 4"/>
      </g>
      <text x="36" y="18" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="500" fill="#1a1a1a">Plan Task</text>
      <text x="92" y="18" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="10" fill="#6b6b6b">plan before executing</text>
    </g>

    <!-- Row: Conductor -->
    <g transform="translate(8 122)">
      <rect x="0" y="0" width="480" height="28" rx="6" fill="transparent"/>
      <g transform="translate(10 6)" stroke="#6b6b6b" stroke-width="1.5" fill="none">
        <rect x="0" y="0" width="16" height="16" rx="2"/>
        <circle cx="5" cy="5" r="1.5" fill="#6b6b6b"/>
        <circle cx="11" cy="11" r="1.5" fill="#6b6b6b"/>
      </g>
      <text x="36" y="18" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="500" fill="#1a1a1a">Conductor</text>
      <text x="100" y="18" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="10" fill="#6b6b6b">canvas workflow</text>
      <!-- Toggle switch (off) -->
      <g transform="translate(444 6)">
        <rect x="0" y="0" width="28" height="16" rx="8" fill="#e5e5e5"/>
        <circle cx="8" cy="8" r="6" fill="#ffffff"/>
      </g>
    </g>

    <!-- Section header: Settings -->
    <text x="14" y="172" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" font-weight="500" fill="#6b6b6b">Settings</text>

    <!-- Row: Permission -->
    <g transform="translate(8 178)">
      <rect x="0" y="0" width="480" height="28" rx="6" fill="transparent"/>
      <g transform="translate(10 6)" stroke="#6b6b6b" stroke-width="1.5" fill="none">
        <path d="M8 0 L14 3 V8 C14 12 8 16 8 16 C8 16 2 12 2 8 V3 Z"/>
      </g>
      <text x="36" y="18" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="500" fill="#1a1a1a">Permission</text>
      <text x="108" y="18" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="10" fill="#6b6b6b">ask before sensitive actions</text>
      <text x="448" y="18" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#6b6b6b" text-anchor="end">ask</text>
    </g>

    <!-- Row: Model -->
    <g transform="translate(8 210)">
      <rect x="0" y="0" width="480" height="28" rx="6" fill="transparent"/>
      <g transform="translate(10 6)" stroke="#6b6b6b" stroke-width="1.5" fill="none">
        <circle cx="8" cy="8" r="7"/>
        <path d="M8 1 V15 M1 8 H15"/>
      </g>
      <text x="36" y="18" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="500" fill="#1a1a1a">Model</text>
      <text x="76" y="18" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="10" fill="#6b6b6b">multi-provider</text>
      <text x="448" y="18" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#6b6b6b" text-anchor="end">claude · gpt · gemini</text>
    </g>

    <!-- Row: Thinking -->
    <g transform="translate(8 242)">
      <rect x="0" y="0" width="480" height="28" rx="6" fill="transparent"/>
      <g transform="translate(10 6)" stroke="#6b6b6b" stroke-width="1.5" fill="none">
        <path d="M2 8 C2 4 5 2 8 2 C11 2 14 4 14 8 C14 10 13 11 12 12 V14 H4 V12 C3 11 2 10 2 8 Z"/>
      </g>
      <text x="36" y="18" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="500" fill="#1a1a1a">Thinking</text>
      <text x="92" y="18" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="10" fill="#6b6b6b">extended reasoning</text>
      <text x="448" y="18" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#6b6b6b" text-anchor="end">medium</text>
    </g>
  </g>

  <!-- Bottom hairline + version metadata -->
  <line x1="64" y1="344" x2="1136" y2="344" stroke="#1a1a1a" stroke-opacity="0.06" stroke-width="1"/>
  <text x="64" y="364" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#6b6b6b" letter-spacing="1">v0.4.2-beta · MIT · MACOS / WINDOWS / LINUX</text>
  <text x="1136" y="364" font-family="Georgia, 'Times New Roman', serif" font-size="12" font-style="italic" fill="#6b6b6b" text-anchor="end">an agent that works where you work</text>
</svg>