<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="430" viewBox="0 0 1200 430" role="img" aria-labelledby="title desc">
  <title id="title">Duya Conductor — an editable project knowledge canvas</title>
  <desc id="desc">A product-native Duya Conductor workspace. Project sources enter a dotted canvas, become a connected knowledge structure, and resolve into a cited editable note.</desc>

  <defs>
    <style>
      @font-face { font-family: "Duya Windsor"; src: url("../../public/fonts/windsor/Windsor-Bold.woff2") format("woff2"); font-weight: 700; }
      @font-face { font-family: "Duya Copernicus"; src: url("../../public/fonts/copernicus/Copernicus-Medium.woff") format("woff"); font-weight: 400; }
      @font-face { font-family: "Duya Styrene"; src: url("../../public/fonts/Styrene.woff2") format("woff2"); font-weight: 400 700; }
      .brand { font-family: "Duya Windsor", Georgia, "Times New Roman", serif; }
      .editorial { font-family: "Duya Copernicus", Georgia, "Times New Roman", serif; }
      .ui { font-family: "Duya Styrene", -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    </style>
    <linearGradient id="mascotBody" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3b145f"/>
      <stop offset="1" stop-color="#160921"/>
    </linearGradient>
    <pattern id="canvasGrid" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#000000" opacity="0.045"/>
    </pattern>
    <clipPath id="windowClip">
      <rect x="24" y="18" width="1152" height="394" rx="20"/>
    </clipPath>
    <filter id="windowShadow" x="-4%" y="-8%" width="108%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#2d1420" flood-opacity="0.09"/>
    </filter>
    <marker id="arrowPurple" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0 L8 4 L0 8 Z" fill="#534ab7"/>
    </marker>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0 L8 4 L0 8 Z" fill="#185fa5"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0 L8 4 L0 8 Z" fill="#0f6e56"/>
    </marker>
    <marker id="arrowAmber" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0 L8 4 L0 8 Z" fill="#854f0b"/>
    </marker>
  </defs>

  <rect width="1200" height="430" rx="26" fill="#f8f4f0"/>

  <!-- Real Duya desktop shell. -->
  <g id="app-frame" filter="url(#windowShadow)">
    <rect x="24" y="18" width="1152" height="394" rx="20" fill="#ffffff" stroke="#ebe6e2"/>
    <g clip-path="url(#windowClip)">
      <rect x="24" y="18" width="1152" height="42" fill="#fdf8f5"/>
      <g transform="translate(43 27)">
        <rect width="24" height="24" rx="7" fill="#b184e2"/>
        <path d="M4 23 C4 14 5 8 10 5 C14 2 19 5 19 10 C21 11 23 13 22 15 C21 17 19 17 18 17 C18 20 17 22 16 24 Z" fill="url(#mascotBody)"/>
        <circle cx="13" cy="9" r="3.4" fill="#fff"/>
        <ellipse cx="19.1" cy="11.2" rx="1.5" ry="2.2" fill="#fff" transform="rotate(-18 19.1 11.2)"/>
      </g>
      <text x="76" y="49" class="brand" font-size="25" font-weight="700" fill="#171313" letter-spacing="0.4">Duya</text>
      <rect x="137" y="30" width="43" height="20" rx="5" fill="#7c3aed"/>
      <text x="158.5" y="44.5" text-anchor="middle" class="ui" font-size="10" font-weight="700" fill="#fff" letter-spacing="0.8">BETA</text>
      <circle cx="1125" cy="39" r="3" fill="#bbb3ad"/>
      <circle cx="1138" cy="39" r="3" fill="#bbb3ad"/>
      <circle cx="1151" cy="39" r="3" fill="#bbb3ad"/>

      <!-- Sidebar: Conductor is the selected primary surface. -->
      <rect x="24" y="60" width="178" height="352" fill="#fdf8f5"/>
      <g class="ui" font-size="13" fill="#6b6561">
        <g transform="translate(39 81)">
          <path d="M0 7 H14 M7 0 V14" stroke="#8f8883" stroke-width="1.4" stroke-linecap="round"/>
          <text x="25" y="12">New Chat</text>
        </g>
        <g transform="translate(32 108)">
          <rect width="154" height="34" rx="9" fill="#f1edff"/>
          <g transform="translate(8 10)">
            <rect x="0" y="0" width="5" height="5" rx="1" fill="none" stroke="#6d28d9"/>
            <rect x="9" y="0" width="5" height="5" rx="1" fill="none" stroke="#6d28d9"/>
            <rect x="0" y="9" width="5" height="5" rx="1" fill="none" stroke="#6d28d9"/>
            <rect x="9" y="9" width="5" height="5" rx="1" fill="none" stroke="#6d28d9"/>
          </g>
          <text x="34" y="22" font-weight="600" fill="#5b21b6">Conductor</text>
        </g>
        <g transform="translate(39 156)">
          <circle cx="7" cy="7" r="6" fill="none" stroke="#8f8883"/>
          <path d="M2 12 L0 15 L5 13" fill="none" stroke="#8f8883" stroke-linecap="round" stroke-linejoin="round"/>
          <text x="25" y="12">Channels</text>
        </g>
        <g transform="translate(39 189)">
          <path d="M7 1 A6 6 0 1 1 2 4 M2 4 V0 M2 4 H6" fill="none" stroke="#8f8883" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
          <text x="25" y="12">Automation</text>
        </g>
      </g>
      <text x="49" y="248" class="ui" font-size="10" fill="#8f8883" letter-spacing="0.7">PROJECT</text>
      <text x="49" y="269" class="ui" font-size="12" font-weight="600" fill="#514a46">duya</text>
      <text x="49" y="287" class="ui" font-size="10" fill="#8f8883">E:\Projects\duya</text>
      <g transform="translate(39 383)">
        <circle cx="7" cy="7" r="5" fill="none" stroke="#8f8883"/>
        <circle cx="7" cy="7" r="1.5" fill="#8f8883"/>
        <text x="25" y="11" class="ui" font-size="12" fill="#6b6561">Settings</text>
      </g>

      <!-- Conductor header + true 20px dot grid. -->
      <rect x="202" y="60" width="974" height="322" fill="#ffffff"/>
      <rect x="202" y="112" width="974" height="270" fill="url(#canvasGrid)"/>
      <line x1="202" y1="112" x2="1176" y2="112" stroke="#000" stroke-opacity="0.055"/>
      <text x="226" y="83" class="editorial" font-size="20" fill="#2b2522">Project Knowledge Map</text>
      <text x="226" y="102" class="ui" font-size="10" fill="#8f8883">Agent-created · human-editable · stored with the project</text>
      <rect x="999" y="75" width="149" height="27" rx="8" fill="#ffffff" stroke="#e5e5e5"/>
      <circle cx="1015" cy="88.5" r="4" fill="#7c3aed"/>
      <text x="1027" y="92.5" class="ui" font-size="11" fill="#514a46">Local-first agents</text>
      <path d="M1134 85 L1138 89 L1142 85" fill="none" stroke="#8f8883" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>

      <!-- 56px compact vertical canvas toolbar. -->
      <g transform="translate(216 127)">
        <rect width="50" height="225" rx="16" fill="#ffffff" stroke="#e5e5e5"/>
        <g transform="translate(8 10)" stroke="#514a46" stroke-width="1.45" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <rect x="0" y="0" width="34" height="32" rx="8" fill="#9d3bea" stroke="none"/>
          <path d="M11 8 L24 16 L17 18 L20 25 L16 27 L13 20 L8 23 Z" fill="#fff" stroke="#fff"/>
          <path d="M10 50 C10 44 13 42 16 44 V40 C16 38 20 38 20 40 V45 C22 42 25 44 24 47 L22 54 C21 58 18 60 14 60 C10 60 8 57 8 54 Z"/>
          <line x1="3" y1="69" x2="31" y2="69" stroke="#e5e5e5"/>
          <path d="M10 81 H23 L27 85 V98 H10 Z M23 81 V85 H27"/>
          <rect x="9" y="113" width="18" height="14" rx="3"/>
          <path d="M11 146 H25 M18 146 V161 M12 161 H24"/>
          <path d="M9 178 H27 V192 H9 Z M9 185 H27 M18 178 V192"/>
          <path d="M9 211 H15 L24 202 M20 202 H24 V206"/>
        </g>
      </g>

      <!-- Status bar from the real canvas surface. -->
      <rect x="202" y="382" width="974" height="30" fill="#ffffff"/>
      <line x1="202" y1="382" x2="1176" y2="382" stroke="#000" stroke-opacity="0.055"/>
      <path d="M226 394 C220 398 225 405 231 401 M226 394 H221 M226 394 V399" fill="none" stroke="#8f8883" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M244 401 C250 405 255 398 249 394 M249 394 H254 M249 394 V399" fill="none" stroke="#8f8883" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="272" y="402" class="ui" font-size="10" fill="#8f8883">100%</text>
      <circle cx="316" cy="398" r="3.5" fill="#22c55e"/>
      <text x="326" y="402" class="ui" font-size="10" fill="#8f8883">synced</text>
      <text x="1149" y="402" text-anchor="end" class="ui" font-size="10" fill="#8f8883">Conductor · editable canvas</text>
    </g>
  </g>

  <!-- 1. Source material lands on the project canvas. -->
  <g id="source-elements">
    <g transform="translate(292 151)">
      <rect width="186" height="92" rx="11" fill="#ffffff" stroke="#ded9d5"/>
      <rect width="186" height="29" rx="11" fill="#fdf8f5"/>
      <rect y="18" width="186" height="11" fill="#fdf8f5"/>
      <path d="M15 8 H22 L25 11 V23 H15 Z M22 8 V11 H25" fill="none" stroke="#7c3aed" stroke-width="1.3" stroke-linejoin="round"/>
      <text x="34" y="19" class="ui" font-size="12" font-weight="600" fill="#2b2522">Project brief</text>
      <path d="M16 47 H157 M16 59 H169 M16 71 H142" stroke="#514a46" stroke-opacity="0.2" stroke-width="3.5" stroke-linecap="round"/>
      <rect x="16" y="79" width="52" height="5" rx="2.5" fill="#7c3aed" opacity="0.42"/>
    </g>
    <g transform="translate(292 267)">
      <rect width="186" height="58" rx="10" fill="rgb(230,241,251)" stroke="rgb(24,95,165)"/>
      <circle cx="22" cy="20" r="7" fill="#ffffff" fill-opacity="0.72"/>
      <circle cx="22" cy="20" r="4" fill="none" stroke="#185fa5" stroke-width="1.2"/>
      <path d="M18 20 H26 M22 16 V24" stroke="#185fa5" stroke-width="1"/>
      <text x="38" y="23" class="ui" font-size="13" font-weight="600" fill="#0d3a66">Primary sources</text>
      <text x="17" y="45" class="ui" font-size="11" fill="#0d3a66" opacity="0.75">browser · files · references</text>
    </g>
    <path d="M478 197 H518 V220 H552" fill="none" stroke="#534ab7" stroke-width="2.5" marker-end="url(#arrowPurple)"/>
    <path d="M478 296 H518 V236 H552" fill="none" stroke="#185fa5" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
  </g>

  <!-- 2. Agent-created structure: compact readable labels and semantic connectors. -->
  <g id="structure-elements">
    <!-- Selected root node with a true canvas focus halo and resize handles. -->
    <rect x="548" y="193" width="204" height="74" rx="12" fill="none" stroke="#007aff" stroke-width="2"/>
    <circle cx="548" cy="193" r="4.5" fill="#ffffff" stroke="#007aff" stroke-width="1.5"/>
    <circle cx="752" cy="193" r="4.5" fill="#ffffff" stroke="#007aff" stroke-width="1.5"/>
    <circle cx="548" cy="267" r="4.5" fill="#ffffff" stroke="#007aff" stroke-width="1.5"/>
    <circle cx="752" cy="267" r="4.5" fill="#ffffff" stroke="#007aff" stroke-width="1.5"/>
    <rect x="554" y="199" width="192" height="62" rx="9" fill="rgb(238,237,254)" stroke="rgb(83,74,183)"/>
    <text x="650" y="226" text-anchor="middle" class="editorial" font-size="21" fill="#3d1a5c">Local-first agents</text>
    <text x="650" y="246" text-anchor="middle" class="ui" font-size="10" fill="#3d1a5c" opacity="0.72">project knowledge, kept in view</text>

    <!-- Floating selection capsule. -->
    <g transform="translate(582 159)">
      <rect width="136" height="28" rx="10" fill="#ffffff" stroke="#e5e5e5"/>
      <circle cx="18" cy="14" r="5" fill="#eeedfe" stroke="#534ab7"/>
      <path d="M43 9 V19 M38 14 H48" stroke="#514a46" stroke-width="1.2" stroke-linecap="round"/>
      <path d="M67 9 H79 M73 9 V19" stroke="#514a46" stroke-width="1.2" stroke-linecap="round"/>
      <path d="M99 10 H111 M99 14 H111 M99 18 H111" stroke="#514a46" stroke-width="1.2" stroke-linecap="round"/>
      <circle cx="125" cy="14" r="1.6" fill="#8f8883"/>
    </g>

    <!-- Shared orthogonal trunk, matching Duya diagram guidance. -->
    <path d="M752 230 H790 M790 167 V293" fill="none" stroke="#534ab7" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M790 167 H820" fill="none" stroke="#185fa5" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
    <path d="M790 230 H820" fill="none" stroke="#0f6e56" stroke-width="2.5" marker-end="url(#arrowGreen)"/>
    <path d="M790 293 H820" fill="none" stroke="#854f0b" stroke-width="2.5" marker-end="url(#arrowAmber)"/>

    <g transform="translate(824 145)">
      <rect width="140" height="44" rx="8" fill="rgb(230,241,251)" stroke="rgb(24,95,165)"/>
      <text x="70" y="27" text-anchor="middle" class="ui" font-size="18" font-weight="600" fill="#0d3a66">Research</text>
    </g>
    <g transform="translate(824 208)">
      <rect width="140" height="44" rx="8" fill="rgb(225,245,238)" stroke="rgb(15,110,86)"/>
      <text x="70" y="27" text-anchor="middle" class="ui" font-size="18" font-weight="600" fill="#1a4d1a">Local context</text>
    </g>
    <g transform="translate(824 271)">
      <rect width="140" height="44" rx="8" fill="rgb(250,238,218)" stroke="rgb(133,79,11)"/>
      <text x="70" y="27" text-anchor="middle" class="ui" font-size="18" font-weight="600" fill="#5c4a00">Permissions</text>
    </g>
  </g>

  <!-- 3. Branches resolve into a durable, editable project document. -->
  <g id="result-element">
    <path d="M964 167 H985 M964 230 H985 M964 293 H985 M985 167 V293 M985 230 H1000" fill="none" stroke="#534ab7" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrowPurple)"/>
    <g transform="translate(1004 139)">
      <rect width="144" height="190" rx="11" fill="#ffffff" stroke="#ded9d5"/>
      <rect width="144" height="30" rx="11" fill="#fdf8f5"/>
      <rect y="19" width="144" height="11" fill="#fdf8f5"/>
      <path d="M13 8 H20 L23 11 V23 H13 Z M20 8 V11 H23" fill="none" stroke="#7c3aed" stroke-width="1.2" stroke-linejoin="round"/>
      <text x="31" y="20" class="ui" font-size="11" font-weight="600" fill="#2b2522">Cited note</text>
      <text x="14" y="57" class="editorial" font-size="17" fill="#2b2522">What stays local?</text>
      <path d="M14 72 H126 M14 83 H119 M14 94 H129" stroke="#514a46" stroke-opacity="0.2" stroke-width="3.2" stroke-linecap="round"/>
      <rect x="14" y="111" width="116" height="43" rx="7" fill="#f7f3ff"/>
      <rect x="14" y="111" width="3" height="43" rx="1.5" fill="#7c3aed"/>
      <text x="25" y="128" class="ui" font-size="9.5" fill="#5b21b6">Context stays inspectable.</text>
      <text x="25" y="143" class="ui" font-size="9.5" fill="#6b6561">Actions stay permissioned.</text>
      <circle cx="19" cy="174" r="4.5" fill="#22c55e"/>
      <text x="30" y="178" class="ui" font-size="9.5" fill="#6b6561">Saved</text>
      <text x="129" y="178" text-anchor="end" class="mono" font-size="8" fill="#8f8883">3 SOURCES</text>
    </g>
  </g>
</svg>
