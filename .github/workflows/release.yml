name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            platform: win
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Setup Python (Windows native modules)
        if: matrix.os == 'windows-2022'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup MSVC toolchain (Windows native modules)
        if: matrix.os == 'windows-2022'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install dependencies
        run: npm ci

      - name: Build workspace packages
        # The agent / gateway packages import @duya/cli/contract, which
        # resolves through packages/cli/package.json exports to
        # packages/cli/dist/contract/index.d.ts. A clean checkout has no
        # dist, so tsc and esbuild both fail until the cli is built.
        run: npm run build:cli && npm run build:agent && npm run build:gateway

      - name: Build application
        env:
          # Vite on macOS arm64 runners OOMs at the default ~2 GB V8 heap
          # while transforming 25k+ modules. Raise the limit for all
          # platforms so the same value works across the matrix.
          NODE_OPTIONS: --max-old-space-size=6144
        run: npm run electron:build

      - name: Verify agent-bundle
        # after-pack.js (scripts/after-pack.js) requires
        # packages/agent/bundle/agent-process-entry.js to exist before it
        # will sign-off the build. macOS arm64 runners have OOM'd inside
        # `npm run bundle:agent` historically; catch the failure here
        # with a clear error rather than letting electron-builder fail
        # in afterPack with a confusing "agent-bundle missing" message.
        run: |
          if [ ! -f packages/agent/bundle/agent-process-entry.js ]; then
            echo "::error::agent-process-entry.js missing after npm run electron:build"
            echo "::group::packages/agent/bundle contents"
            ls -la packages/agent/bundle/ 2>&1 || echo "(directory does not exist)"
            echo "::endgroup::"
            exit 1
          fi
          echo "agent-bundle present: $(du -h packages/agent/bundle/agent-process-entry.js | cut -f1)"

      - name: Build and Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --config electron-builder.yml --publish always

      - name: Upload artifacts (fallback)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-${{ matrix.platform }}
          path: |
            release/
            dist/
