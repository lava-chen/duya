name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            platform: win
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Setup Python (Windows native modules)
        if: matrix.os == 'windows-2022'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Python (macOS native modules)
        if: matrix.os == 'macos-latest'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup MSVC toolchain (Windows native modules)
        if: matrix.os == 'windows-2022'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install dependencies
        run: npm ci

      - name: Build workspace packages
        # Two-pass build to break the @duya/agent ↔ @duya/conductor circular
        # dependency on a clean checkout (no dist/):
        #   Pass 1: build:conductor may emit TS2307 for @duya/agent/* (agent
        #           dist doesn't exist yet), but tsc still emits .d.ts with
        #           `any` fallbacks. Errors are suppressed via `|| echo`.
        #           Pass 1 dist may contain stale nested files from tsc's
        #           Bundler fallback to agent source — these are cleaned.
        #   Agent:  builds against conductor's pass-1 .d.ts (resolves via
        #           node_modules symlink + ambient shim).
        #   Clean:  remove conductor dist to discard pass-1 junk output.
        #   Pass 2: rebuild conductor — agent dist now exists, all types
        #           resolve correctly, .d.ts is regenerated with real types.
        # build:agent already runs build:cli + the two-pass conductor + agent.
        run: npm run build:agent && npm run build:gateway

      - name: Build application
        env:
          # Vite on macOS arm64 runners OOMs at the default ~2 GB V8 heap
          # while transforming 25k+ modules. Raise the limit for all
          # platforms so the same value works across the matrix.
          NODE_OPTIONS: --max-old-space-size=6144
        run: npm run electron:build

      - name: Verify agent-bundle
        # after-pack.js (scripts/after-pack.js) requires
        # packages/agent/bundle/agent-process-entry.js to exist before it
        # will sign-off the build. macOS arm64 runners have OOM'd inside
        # `npm run bundle:agent` historically; catch the failure here
        # with a clear error rather than letting electron-builder fail
        # in afterPack with a confusing "agent-bundle missing" message.
        shell: bash
        run: |
          if [ ! -f packages/agent/bundle/agent-process-entry.js ]; then
            echo "::error::agent-process-entry.js missing after npm run electron:build"
            echo "::group::packages/agent/bundle contents"
            ls -la packages/agent/bundle/ 2>&1 || echo "(directory does not exist)"
            echo "::endgroup::"
            exit 1
          fi
          echo "agent-bundle present: $(du -h packages/agent/bundle/agent-process-entry.js | cut -f1)"

      - name: Build and Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS code signing + notarization. When these secrets are absent
          # the build produces an unsigned (ad-hoc) app; when present,
          # after-sign.js notarizes the app automatically. Add these as
          # repository secrets to enable signed macOS releases.
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        # Explicit bash shell across all platforms. The script below uses
        # POSIX-only syntax (`[ -z "$VAR" ]`, `unset`) which Windows
        # PowerShell cannot parse (ParserError "Missing '(' after 'if'").
        # Pinning to bash lets the same step run on windows-2022, macos,
        # and ubuntu runners without per-platform wrappers.
        shell: bash
        # Empty CSC_LINK (secret not set) makes electron-builder treat the
        # empty string as a certificate file path, failing with "not a file".
        # Unset empty signing vars and disable auto-discovery so the build
        # proceeds unsigned instead of crashing. On macOS arm64 runners
        # `electron-builder --mac` defaults to arch=x64; after-pack then
        # cross-compiles better_sqlite3 from arm64 to x64, which
        # verify-packaged-parity flags as FATAL (binary x64 but host arm64).
        # Pinning --arm64 on arm64 runners and --x64 on Intel keeps the
        # packaged binary aligned with the runner CPU and the verify step
        # green. Apple Silicon (arm64) is the supported target; Intel Macs
        # are no longer published from this CI matrix.
        run: |
          if [ -z "$CSC_LINK" ]; then
            unset CSC_LINK CSC_KEY_PASSWORD
            export CSC_IDENTITY_AUTO_DISCOVERY=false
          fi
          [ -z "$APPLE_ID" ] && unset APPLE_ID || true
          [ -z "$APPLE_APP_SPECIFIC_PASSWORD" ] && unset APPLE_APP_SPECIFIC_PASSWORD || true
          [ -z "$APPLE_TEAM_ID" ] && unset APPLE_TEAM_ID || true
          if [ "${{ matrix.platform }}" = "mac" ]; then
            HOST_ARCH="$(uname -m)"
            if [ "$HOST_ARCH" = "arm64" ]; then
              ARCH_FLAG="--arm64"
            else
              ARCH_FLAG="--x64"
            fi
            npx electron-builder --mac $ARCH_FLAG --config electron-builder.yml --publish always
          else
            npx electron-builder --config electron-builder.yml --publish always
          fi

      - name: Verify packaged artifacts
        # Runs after the build to confirm critical files landed inside the
        # packaged app (catches afterPack path bugs that only manifest on
        # macOS where resources live inside the .app bundle).
        if: success() || failure()
        run: node scripts/verify-packaged-parity.mjs

      - name: Upload artifacts (fallback)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-${{ matrix.platform }}
          path: |
            release/
            dist/
