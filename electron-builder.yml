appId: com.duya.app
productName: DUYA

npmRebuild: false

# Publish configuration
# - github: uploads release assets to GitHub Releases during build
# - generic: tells auto-updater where to download updates at runtime
publish:
  - provider: github
    owner: lava-chen
    repo: duya
    releaseType: release
  - provider: generic
    url: https://update.duya.dev
    channel: latest

directories:
  output: release

files:
  - package.json
  - dist-electron/**/*
  - dist/**/*
  # Native modules kept inside dist/node_modules by scripts/build-electron.mjs
  # must survive the "!node_modules" exclusion below so bundled external
  # require('better-sqlite3') / require('node-pty') resolve in production.
  - dist/node_modules/better-sqlite3/***
  - dist/node_modules/bindings/***
  - dist/node_modules/file-uri-to-path/***
  - dist/node_modules/node-pty/***
  - "!node_modules"
  - "!src"
  - "!electron"
  - "!build"
  - "!scripts"
  - "!docs"
  - "!release"
  - "!packages"
  - "!data"
  - "!.duya"

# extraResources: Files copied to resources/ directory, outside of app.asar
# The agent bundle is built with esbuild (bundle: true) so all runtime
# dependencies are inlined into a single file. No node_modules copying needed.
extraResources:
  - from: resources/automation-templates/
    to: automation-templates/
    filter: ["**/*"]
  - from: assets/
    to: assets/
    filter: ["**/*"]
  - from: node_modules/better-sqlite3/
    to: better-sqlite3/
    filter:
      - "**/*"
      - "!test/**"
      - "!benchmark/**"
      - "!docs/**"
  - from: packages/agent/bundle/
    to: agent-bundle/
    filter: ["**/*"]
  - from: packages/cli/bundle/
    to: cli-bundle/
    filter: ["**/*"]
  - from: packages/gateway/bundle/
    to: gateway-bundle/
    filter: ["**/*"]
  - from: packages/agent/skills/
    to: agent/skills/
    filter: ["**/*"]
  - from: public/
    to: public/
    filter: ["**/*"]
  - from: extension/
    to: extension/
    filter: ["**/*"]
  - from: node_modules/node-pty/
    to: node-pty/
    filter: ["**/*"]
  # Document parser sidecar is Windows-only (document-parser.exe is a
  # PyInstaller Windows binary). It is declared under win.extraResources
  # below to avoid shipping ~hundreds of MB of useless Windows binaries
  # inside the macOS .app and Linux AppImage.

afterPack: scripts/after-pack.js
afterSign: scripts/after-sign.js

# Native modules need external files available outside app.asar.
asarUnpack:
  - "**/better-sqlite3/build/Release/*.node"
  - "**/node-pty/build/Release/*.node"
  - "**/node-pty/prebuilds/**/*"

mac:
  icon: assets/macos/icon.icns
  category: public.app-category.developer-tools
  artifactName: "${productName}-${version}-${arch}.${ext}"
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.inherit.plist
  # Keep false here so local builds without Apple credentials succeed.
  # Notarization is performed conditionally by scripts/after-sign.js when
  # APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD / APPLE_TEAM_ID are set in CI.
  notarize: false
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]

dmg:
  # DMG window with the standard "drag to Applications" affordance.
  title: "${productName} ${version}"
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

win:
  icon: assets/windows/icon.ico
  target:
    - target: nsis
      arch: [x64]
  # Windows-only document parser sidecar (OPTIONAL). Only present when
  # build/document-parser/ has been populated by `npm run build:docparser`.
  # Kept here (not in the global extraResources) so macOS/Linux builds do
  # not ship the Windows .exe/.dll/.pyd payload.
  extraResources:
    - from: build/document-parser/
      to: document-parser/
      filter: ["**/*"]

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  deleteAppDataOnUninstall: false
  artifactName: "${productName}.Setup.${version}.${ext}"
  installerIcon: assets/windows/icon.ico

linux:
  maintainer: DUYA Team <opensource@duya.dev>
  icon: assets/linux/icons/512x512.png
  category: Development
  artifactName: "${productName}-${version}-${arch}.${ext}"
  desktop:
    entry:
      Name: DUYA Beta
      Comment: AI Agent Desktop Client (Beta)
      Categories: Development;IDE;
      StartupWMClass: duya
  target:
    - AppImage
    - deb
    - rpm
